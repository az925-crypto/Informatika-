name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      # Note: .env sengaja tidak dibuat di sini. Kalau tidak ada, secrets-gradle-plugin
      # otomatis fallback ke placeholder di .env.example (biar BuildConfig tetap valid).
      # Kalau nanti mau isi GEMINI_API_KEY beneran, tambahkan step ini kembali
      # setelah bikin secret GEMINI_API_KEY di Settings > Secrets > Actions.

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scantrack-debug-apk
          path: app/build/outputs/apk/debug/*.apk
